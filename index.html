<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐹 おしゃべり白ネズミ AI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: #0d0d1a; color: #e0e0ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #game-container { width: 350px; background: #161626; border: 2px solid #2d2d44; border-radius: 24px; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        /* APIキー入力欄（最初はこれが必要） */
        #api-setup { background: #090911; padding: 10px; border-radius: 12px; border: 1px solid #ffb703; display: flex; flex-direction: column; gap: 8px; }
        #api-key-input { background: #1a1a2e; border: 1px solid #31314d; color: white; padding: 8px; border-radius: 6px; font-size: 10px; }
        
        /* 部屋・ネズミ */
        #room-viewport { width: 100%; height: 180px; background: #090911; border-radius: 16px; border: 1px solid #2d2d44; overflow: hidden; }
        canvas#room-canvas { display: block; }

        /* AI会話ログ */
        #dialogue-box { background: #090911; border: 1px solid #2d2d44; border-radius: 16px; padding: 12px; height: 120px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { font-size: 12px; line-height: 1.4; padding: 6px 10px; border-radius: 10px; max-width: 85%; }
        .ai-msg { background: #212135; align-self: flex-start; color: #e2e8f0; border-bottom-left-radius: 2px; }
        .user-msg { background: #4e4e70; align-self: flex-end; color: white; border-bottom-right-radius: 2px; }

        /* チャット入力エリア */
        #chat-area { display: flex; gap: 6px; }
        #chat-input { flex-grow: 1; background: #090911; border: 1px solid #2d2d44; border-radius: 10px; color: white; padding: 10px; font-size: 13px; }
        #send-btn { background: #ffb703; border: none; padding: 0 15px; border-radius: 10px; color: #0d0d1a; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="api-setup" id="setup-ui">
        <p style="font-size: 10px; color: #ffb703;">1. APIキーを貼り付けてね</p>
        <input type="password" id="api-key-input" placeholder="AIza...">
        <button onclick="saveKey()" style="background: #ffb703; border: none; border-radius: 4px; padding: 4px; font-size: 11px; cursor: pointer;">接続する</button>
    </div>

    <div id="room-viewport">
        <canvas id="room-canvas" width="310" height="180"></canvas>
    </div>

    <div id="dialogue-box" id="chat-log">
        <div class="msg ai-msg">ネズミ「接続してくれたら、おしゃべりできるよ！」</div>
    </div>

    <div id="chat-area">
        <input type="text" id="chat-input" placeholder="ネズミに話しかける..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button id="send-btn" onclick="sendMessage()">送信</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('room-canvas');
    const ctx = canvas.getContext('2d');
    let apiKey = localStorage.getItem('gemini_api_key') || "";
    let nezumiState = 'normal';

    if(apiKey) document.getElementById('api-setup').style.display = 'none';

    function saveKey() {
        const val = document.getElementById('api-key-input').value;
        if(val) {
            apiKey = val;
            localStorage.setItem('gemini_api_key', val);
            document.getElementById('api-setup').style.display = 'none';
            addMessage("ai", "接続成功！やっとお話しできるね！何から話そうか？");
        }
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if(!text || !apiKey) return;

        addMessage("user", text);
        input.value = "";
        
        nezumiState = 'happy'; // 考えてる間は嬉しそうに

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `あなたは可愛い白いペットのネズミです。名前はまだありません。一人称は「ボク」です。語尾には「〜だよ」「〜だね」など、ほっこりする口調を使ってください。短い返信を心がけてください。今回のユーザーの発言: ${text}` }] }]
                })
            });
            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            addMessage("ai", aiText);
            nezumiState = 'normal';
        } catch (e) {
            addMessage("ai", "…ごめん、うまく繋がらなかったみたい。キーが合ってるか確認してみて？");
            nezumiState = 'normal';
        }
    }

    function addMessage(type, text) {
        const box = document.getElementById('dialogue-box');
        const div = document.createElement('div');
        div.className = `msg ${type}-msg`;
        div.textContent = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    // 💡 リアルピクセル描画（前回のをコンパクトに）
    function draw() {
        ctx.clearRect(0,0,310,180);
        // 背景
        ctx.fillStyle = '#d7ccc8'; ctx.fillRect(0,0,310,120);
        ctx.fillStyle = '#8d6e63'; ctx.fillRect(0,120,310,60);
        
        const time = Date.now();
        const breath = Math.sin(time / 250) * 1.5;
        const bx = 110, by = 110 + breath;

        // ネズミ
        ctx.fillStyle = '#ffffff';
        ctx.beginPath(); ctx.ellipse(bx+25, by+15, 35, 25, 0, 0, Math.PI*2); ctx.fill(); // 胴体
        ctx.beginPath(); ctx.ellipse(bx+15, by-5, 20, 18, 0, 0, Math.PI*2); ctx.fill(); // 頭
        
        ctx.fillStyle = '#ffccd5';
        ctx.beginPath(); ctx.arc(bx, by-15, 12, 0, Math.PI*2); ctx.fill(); // 奥耳
        ctx.beginPath(); ctx.arc(bx+20, by-15, 12, 0, Math.PI*2); ctx.fill(); // 手前耳
        
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(bx+12, by-8, 3, 0, Math.PI*2); ctx.fill(); // 目
        
        ctx.fillStyle = '#ff9ebb';
        ctx.fillRect(bx+5, by, 3, 2); // 鼻
        
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>

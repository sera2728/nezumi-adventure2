<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐹 ねずみのほっこりルーム DX Premium</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #0d0d1a;
            color: #e0e0ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 📖 オープニング名前入力画面 */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #06060c;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            z-index: 1000;
            text-align: center;
            gap: 24px;
            transition: opacity 0.5s ease;
        }
        .intro-title {
            font-size: 14px;
            color: #aaddff;
            line-height: 1.8;
            letter-spacing: 1.5px;
            max-width: 280px;
            font-weight: normal;
        }
        #name-input {
            background: #161626;
            border: 1px solid #31314d;
            border-radius: 12px;
            color: #fff;
            padding: 12px;
            font-size: 14px;
            text-align: center;
            width: 220px;
            outline: none;
        }
        #name-input:focus { border-color: #ffb703; }
        .start-btn {
            background: linear-gradient(135deg, #ffb703, #ee9b00);
            color: #0d0d1a;
            font-weight: bold;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-size: 13px;
            cursor: pointer;
        }

        /* ゲームメインコンテナ */
        #game-container {
            width: 350px;
            background: #161626;
            border: 2px solid #2d2d44;
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        #status-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            background: #090911;
            padding: 10px;
            border-radius: 14px;
            font-size: 11px;
            border: 1px solid #1f1f33;
        }
        .status-item { display: flex; align-items: center; gap: 4px; }
        .val { color: #ffb703; font-weight: bold; }
        .alert-val { color: #ff4d6d; font-weight: bold; }

        #vitals-panel {
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: #090911;
            padding: 8px 12px;
            border-radius: 14px;
            font-size: 11px;
        }
        .vital-row { display: flex; justify-content: space-between; align-items: center; }
        .progress-bg { width: 180px; height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
        .progress-bar { height: 100%; width: 100%; transition: width 0.3s, background-color 0.3s; }

        #room-viewport {
            position: relative;
            width: 100%;
            height: 220px;
            background: #090911;
            border-radius: 16px;
            border: 1px solid #2d2d44;
            overflow: hidden;
        }
        canvas#room-canvas {
            display: block;
        }

        #dialogue-box {
            background: #090911;
            border: 1px solid #2d2d44;
            border-radius: 16px;
            padding: 12px;
            min-height: 75px;
        }
        #speaker-name {
            font-size: 12px;
            color: #ff758f;
            margin-bottom: 4px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        #dialogue-text {
            font-size: 13px;
            line-height: 1.5;
            color: #e2e8f0;
        }

        #action-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .btn {
            background: #212135;
            color: #f1f5f9;
            border: 1px solid #31314d;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            text-align: left;
            transition: all 0.2s;
        }
        .btn:hover { background: #2d2d49; border-color: #4e4e75; }
        .btn:disabled { background: #11111a; color: #555; border-color: #222; cursor: not-allowed; }
        
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .act-btn {
            text-align: center;
            background: linear-gradient(135deg, #ffb703, #ee9b00);
            color: #0d0d1a;
            font-weight: bold;
            border: none;
            padding: 8px;
            font-size: 12px;
        }
        .act-btn:hover:not(:disabled) { background: linear-gradient(135deg, #ffc947, #ffb703); transform: translateY(-1px); }
        .clean-btn { background: linear-gradient(135deg, #20b2aa, #008080); color: white; }
        .clean-btn:hover:not(:disabled) { background: linear-gradient(135deg, #33cccc, #20b2aa); }
        .med-btn { background: linear-gradient(135deg, #ff4d6d, #c9184a); color: white; }
        .med-btn:hover:not(:disabled) { background: linear-gradient(135deg, #ff758f, #ff4d6d); }
        .out-btn { background: linear-gradient(135deg, #9ece6a, #7aa2f7); color: #0d0d1a; }
    </style>
</head>
<body>

<div id="intro-screen">
    <h1 class="intro-title">画面から出られない孤独なネズミを救うための、あなただけの物語</h1>
    <input type="text" id="name-input" placeholder="ネズミの名前を入力..." maxlength="8">
    <button class="start-btn" onclick="initStory()">物語を始める</button>
</div>

<div id="game-container">
    <div id="status-bar">
        <div class="status-item">🤝 なかよし: <span id="love-val" class="val">10</span></div>
        <div class="status-item">🧀 チーズ: <span id="cheese-val" class="val">3</span></div>
        <div class="status-item">💩 部屋のふん: <span id="poop-val" class="val">0 / 5</span></div>
        <div class="status-item">⚠️ 状態: <span id="condition-val" class="val">健康</span></div>
    </div>

    <div id="vitals-panel">
        <div class="vital-row">
            <span>🍖 お腹の満足度</span>
            <div class="progress-bg"><div id="hunger-bar" class="progress-bar" style="background: #9ece6a;"></div></div>
        </div>
        <div class="vital-row">
            <span>💧 のどの潤い</span>
            <div class="progress-bg"><div id="thirst-bar" class="progress-bar" style="background: #4ea8de;"></div></div>
        </div>
    </div>

    <div id="room-viewport">
        <canvas id="room-canvas" width="314" height="200"></canvas>
    </div>

    <div id="dialogue-box">
        <div id="speaker-name">白ネズミ</div>
        <div id="dialogue-text">「なかよし度が増えると、ボクもっとハッピーになれるんだ！きみのこといっぱい教えてね！」</div>
    </div>

    <div id="action-area">
        <div id="options-container" style="display: flex; flex-direction: column; gap: 6px;"></div>
        
        <div class="action-grid">
            <button id="cmd-cheese" class="btn act-btn" onclick="giveCheese()">🧀 チーズをあげる</button>
            <button id="cmd-water" class="btn act-btn" style="background: linear-gradient(135deg, #4ea8de, #0077b6); color: white;" onclick="giveWater()">💧 水をあげる</button>
            <button id="cmd-stroke" class="btn act-btn" onclick="strokeHead()">👋 なでなでする</button>
            <button id="cmd-clean" class="btn act-btn clean-btn" onclick="cleanRoom()">🧹 部屋を掃除する</button>
            <button id="cmd-out" class="btn act-btn out-btn" style="grid-column: span 2; display: none;" onclick="goOutEvent()">🚶 ポケットに入れてお出かけする</button>
            <button id="cmd-med" class="btn act-btn med-btn" style="grid-column: span 2; display: none;" onclick="giveMedicine()">💊 薬を飲ませる</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('room-canvas');
    const ctx = canvas.getContext('2d');

    // 💡 神様のイラスト画像を読み込む処理
    const nezumiImg = new Image();
    nezumiImg.src = 'nezumiirasuto.jpg';

    let nezumiName = localStorage.getItem('nezumi_name') || "";
    let love = parseInt(localStorage.getItem('nezumi_love')) || 10;
    let cheese = parseInt(localStorage.getItem('nezumi_cheese')) || 3;
    let poopCount = parseInt(localStorage.getItem('nezumi_poop')) || 0;
    let isSick = localStorage.getItem('nezumi_sick') === 'true';
    let isDead = localStorage.getItem('nezumi_dead') === 'true';

    let lastTime = parseInt(localStorage.getItem('nezumi_last_time')) || Date.now();
    let now = Date.now();
    let elapsedSeconds = (now - lastTime) / 1000;

    const decayPerSecondHunger = 100 / 259200; 
    const decayPerSecondThirst = 100 / 172800; 

    let hunger = parseFloat(localStorage.getItem('nezumi_hunger'));
    if (isNaN(hunger)) hunger = 100;
    let thirst = parseFloat(localStorage.getItem('nezumi_thirst'));
    if (isNaN(thirst)) thirst = 100;

    if (nezumiName && nezumiName !== "") {
        document.getElementById('intro-screen').style.display = 'none';
        document.getElementById('speaker-name').textContent = nezumiName;
    }

    function initStory() {
        const input = document.getElementById('name-input');
        let nameVal = input.value.trim();
        if (!nameVal) nameVal = "ユキマル"; 
        
        nezumiName = nameVal;
        localStorage.setItem('nezumi_name', nezumiName); 
        document.getElementById('speaker-name').textContent = nezumiName;
        
        const screen = document.getElementById('intro-screen');
        screen.style.opacity = '0';
        setTimeout(() => { screen.style.display = 'none'; }, 500);

        showScenario('start');
        saveGame();
    }

    if (!isDead) {
        hunger = Math.max(0, hunger - (elapsedSeconds * decayPerSecondHunger));
        thirst = Math.max(0, thirst - (elapsedSeconds * decayPerSecondThirst));
        let newPoops = Math.floor(elapsedSeconds / 43200); 
        if (hunger > 10) poopCount = Math.min(5, poopCount + newPoops);
        if (poopCount >= 3 && !isSick && Math.random() < (love >= 100 ? 0.05 : 0.2)) isSick = true;
        if (hunger <= 0 || thirst <= 0) isDead = true;
    }

    localStorage.setItem('nezumi_last_time', now);

    let nezumiState = 'normal'; 
    let blinkTimer = 0;
    let isBlinking = false;

    const scenarios = {
        start: {
            text: "「なかよし度が増えると、ボクもっとハッピーになれるんだ！きみのこといっぱい教えてね！」",
            options: [
                { text: "「今日の調子はどう？」", next: "condition" },
                { text: "「好きな食べ物は？」", next: "food" },
                { text: "「お部屋の住み心地は？」", next: "room" },
                { text: "「普段は何して遊んでるの？」", next: "play_event" }
            ]
        },
        condition: {
            text: "....きみに会えたから、ボクすっごく元気が出たよ！えへへ。」",
            loveBonus: 3, state: 'happy', options: [{ text: "「それはよかった！」", next: "start" }]
        },
        food: {
            text: "「やっぱり黄色くてあま～い、とろけるチーズが一番好き！きみは何が好き？」",
            options: [{ text: "「お肉が好きだよ」", next: "meat" }, { text: "「甘いお菓子が好き」", next: "sweet" }]
        },
        meat: {
            text: "「お肉！ワイルドだね！ボクは食べられないけど、きみがいっぱい食べて元気なら嬉しいな！」",
            loveBonus: 3, state: 'happy', options: [{ text: "「ありがとう！」", next: "start" }]
        },
        sweet: {
            text: "「お菓子！いいよねぇ、クッキーのひとかけらでもボクにとっては大ごちそうなんだ！」",
            loveBonus: 4, state: 'happy', options: [{ text: "「今度分けてあげるね」", next: "start" }]
        },
        room: {
            text: "「この木のお部屋、あったかくて大好き！でも、もっとアイテムが増えたら嬉しいな！」",
            options: [{ text: "「今度ふかふかのベッドを買ってあげる」", next: "room_bed" }, { text: "「おもちゃの車とかどう？」", next: "room_toy" }]
        },
        room_bed: {
            text: "「わぁっふかふかのベッド！そこで丸くなって寝たら絶対に幸せだなぁ…楽しみ！」",
            loveBonus: 5, state: 'happy', options: [{ text: "「楽しみにしててね」", next: "start" }]
        },
        room_toy: {
            text: "「おもちゃの車！それに乗ってお部屋を大冒険するんだね！ワクワクしちゃうな！」",
            loveBonus: 4, state: 'happy', options: [{ text: "「いっぱい遊んでね」", next: "start" }]
        },
        play_event: {
            text: "「普段はね、お部屋のすみをクンクン探検したり、しっぽを追いかけてるよ。きみは何して遊んでるの？」",
            options: [{ text: "「ゲームをして遊んでるよ」", next: "play_game" }, { text: "「お外をのんびりお散歩してるよ」", next: "play_walk" }]
        },
        play_game: {
            text: "「ゲーム！今ボクときみがこうやって遊んでるのもゲームなのかな？同じ遊びができて幸せだよ！」",
            loveBonus: 5, state: 'happy', options: [{ text: "「これからも一緒に遊ぼう」", next: "start" }]
        },
        play_walk: {
            text: "「お散歩！いつかきみのポケットに入って、一緒にお外を見てみたいな！」",
            loveBonus: 4, state: 'happy', options: [{ text: "「いつか一緒に行こうね」", next: "start" }]
        }
    };

    function checkMilestones(oldLove, newLove) {
        if (oldOldLove < 30 && newLove >= 30) { alert("🎉 なかよし度が30突破！【おもちゃのミニカー】がお部屋に追加されました！"); updateCarOption(); }
        if (oldLove < 60 && newLove >= 60) { alert("🎉 なかよし度が60突破！新コマンド【ポケットに入れてお出かけする】が解放されました！"); }
        if (oldLove < 100 && newLove >= 100) { alert("🎉 なかよし度が100突破！【ふかふか高級ベッド】がお部屋に設置されました！"); }
    }

    function updateCarOption() {
        if (love >= 30 && !scenarios.start.options.some(o => o.next === 'event_car')) {
            scenarios.start.options.push({ text: "「ミニカーで遊ぼう！」", next: "event_car" });
            scenarios.event_car = {
                text: "「わーい！この赤い車、ボクの宝物なんだ！きみと一緒に走らせるとすっごく楽しい！」",
                loveBonus: 5, state: 'happy', options: [{ text: "「ぶーんぶーん！」", next: "start" }]
            };
        }
    }

    setInterval(() => {
        if (isDead) return;
        hunger = Math.max(0, hunger - (15 * decayPerSecondHunger));
        thirst = Math.max(0, thirst - (15 * decayPerSecondThirst));
        if (hunger > 20 && Math.random() < 0.005) { poopCount = Math.min(5, poopCount + 1); }
        if (poopCount >= 3 && !isSick && Math.random() < (love >= 100 ? 0.002 : 0.02)) { isSick = true; }
        if (hunger <= 0 || thirst <= 0) { triggerDeath(); }
        saveGame(); updateUI();
    }, 15000);

    function saveGame() {
        if(nezumiName && nezumiName !== "") { localStorage.setItem('nezumi_name', nezumiName); }
        localStorage.setItem('nezumi_love', love);
        localStorage.setItem('nezumi_cheese', cheese);
        localStorage.setItem('nezumi_hunger', hunger);
        localStorage.setItem('nezumi_thirst', thirst);
        localStorage.setItem('nezumi_poop', poopCount);
        localStorage.setItem('nezumi_sick', isSick);
        localStorage.setItem('nezumi_dead', isDead);
        localStorage.setItem('nezumi_last_time', Date.now());
    }

    function updateUI() {
        document.getElementById('love-val').textContent = love;
        document.getElementById('cheese-val').textContent = cheese;
        document.getElementById('poop-val').textContent = `${poopCount} / 5`;
        
        document.getElementById('hunger-bar').style.width = hunger + '%';
        document.getElementById('thirst-bar').style.width = thirst + '%';
        document.getElementById('hunger-bar').style.backgroundColor = hunger < 25 ? '#ff4d6d' : '#9ece6a';
        document.getElementById('thirst-bar').style.backgroundColor = thirst < 25 ? '#ff4d6d' : '#4ea8de';

        if (!isDead && love >= 60 && nezumiState !== 'out') {
            document.getElementById('cmd-out').style.display = "block";
        } else {
            document.getElementById('cmd-out').style.display = "none";
        }

        if (isDead) {
            document.getElementById('condition-val').textContent = "死亡";
            document.getElementById('condition-val').className = "alert-val";
        } else if (isSick) {
            document.getElementById('condition-val').textContent = "病気";
            document.getElementById('condition-val').className = "alert-val";
        } else {
            document.getElementById('condition-val').textContent = "健康";
            document.getElementById('condition-val').className = "val";
        }
    }

    function goOutEvent() {
        if (isDead || isSick) return;
        nezumiState = 'out'; updateUI();
        document.getElementById('speaker-name').textContent = "システム";
        document.getElementById('dialogue-text').textContent = `${nezumiName}を胸のポケットに入れて、一緒にお散歩に出かけました……。`;
        document.getElementById('options-container').innerHTML = '';
        document.querySelectorAll('.btn, .act-btn').forEach(b => { if(b.id !== 'dummy') b.disabled = true; });

        setTimeout(() => {
            nezumiState = 'normal';
            document.querySelectorAll('.btn, .act-btn').forEach(b => b.disabled = false);
            document.getElementById('speaker-name').textContent = nezumiName;
            let rewardText = "「お外の世界は広くてドキドキしたなぁ…でもきみのポケットの中が一番安心するよ。」";
            document.getElementById('dialogue-text').textContent = rewardText;
            let oldLove = love; love += 5; checkMilestones(oldLove, love);
            saveGame(); updateUI();
            setTimeout(() => { showScenario('start'); }, 4000);
        }, 3500);
    }

    function triggerDeath() {
        isDead = true; saveGame(); updateUI();
        document.getElementById('speaker-name').textContent = "システム";
        document.getElementById('dialogue-text').textContent = `${nezumiName || '白ネズミ'}は天国へ旅立ってしまったようです。`;
        document.querySelectorAll('.btn, .act-btn').forEach(b => b.disabled = true);
        document.getElementById('options-container').innerHTML = '<button class="btn act-btn" style="text-align:center;" onclick="resetGame()">新しく飼い直す（リセット）</button>';
    }

    function resetGame() { localStorage.clear(); location.reload(); }
    function cleanRoom() { if(isDead) return; poopCount = 0; document.getElementById('dialogue-text').textContent = "「お部屋がピカピカになった！お掃除ありがとう！」"; saveGame(); updateUI(); }
    function giveMedicine() { if(isDead || !isSick) return; isSick = false; nezumiState = 'happy'; document.getElementById('dialogue-text').textContent = "「お薬効いたよ！元気になってよかった！」"; saveGame(); updateUI(); }
    function giveWater() { if(isDead) return; thirst = Math.min(100, thirst + 40); nezumiState = 'happy'; document.getElementById('dialogue-text').textContent = "「お水美味しい！のどのカラカラが治ったよ！」"; saveGame(); updateUI(); }
    function giveCheese() {
        if(isDead) return;
        if (cheese > 0) {
            cheese--; let oldLove = love; love += 4; checkMilestones(oldLove, love);
            hunger = Math.min(100, hunger + 40); nezumiState = 'eating';
            document.getElementById('dialogue-text').textContent = "「大好きなチーズだ！もぐもぐ…お腹いっぱい！」";
            setTimeout(() => { nezumiState = 'normal'; showScenario('start'); }, 3500);
            saveGame(); updateUI();
        }
    }
    function strokeHead() {
        if(isDead) return;
        let oldLove = love; love += 1; checkMilestones(oldLove, love); nezumiState = 'happy';
        document.getElementById('dialogue-text').textContent = "「頭をなでられるの、あったかくて大好き…」";
        setTimeout(() => { nezumiState = 'normal'; showScenario('start'); }, 3500);
        saveGame(); updateUI();
    }

    // 💡 神様のイラストを呼吸＆まばたきさせる、新しいハイエンド描画エンジン！
    function drawPremiumRealPixel() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // お出かけ背景
        if (nezumiState === 'out') {
            let skyGrad = ctx.createLinearGradient(0, 0, 0, 120); skyGrad.addColorStop(0, '#7aa2f7'); skyGrad.addColorStop(1, '#aaddff');
            ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, canvas.width, 120);
            ctx.fillStyle = '#ffffff'; ctx.fillRect(40, 30, 50, 14); ctx.fillRect(180, 20, 60, 16);
            let grassGrad = ctx.createLinearGradient(0, 120, 0, canvas.height); grassGrad.addColorStop(0, '#9ece6a'); grassGrad.addColorStop(1, '#739a46');
            ctx.fillStyle = grassGrad; ctx.fillRect(0, 120, canvas.width, 80);
            ctx.fillStyle = '#4e4e70'; ctx.fillRect(120, 130, 70, 50); 
            ctx.fillStyle = '#ffccd5'; ctx.fillRect(145, 122, 20, 8);  
            return;
        }

        // お部屋の木の背景
        let wallGrad = ctx.createLinearGradient(0, 0, 0, 130); wallGrad.addColorStop(0, '#e3d8d4'); wallGrad.addColorStop(1, '#b0bec5');
        ctx.fillStyle = wallGrad; ctx.fillRect(0, 0, canvas.width, 130);
        ctx.fillStyle = 'rgba(141, 110, 99, 0.12)'; for(let i = 0; i < canvas.width; i += 24) ctx.fillRect(i, 0, 2, 130);
        let floorGrad = ctx.createLinearGradient(0, 130, 0, canvas.height); floorGrad.addColorStop(0, '#8d6e63'); floorGrad.addColorStop(1, '#4e342e');
        ctx.fillStyle = floorGrad; ctx.fillRect(0, 130, canvas.width, 70);
        ctx.fillStyle = 'rgba(46, 26, 21, 0.3)'; for(let y = 130; y < canvas.height; y += 14) ctx.fillRect(0, y, canvas.width, 1);

        if (love >= 30) { ctx.fillStyle = '#ff4d6d'; ctx.fillRect(30, 132, 16, 8); ctx.fillStyle = '#ffb703'; ctx.fillRect(36, 129, 8, 4); ctx.fillStyle = '#11111a'; ctx.fillRect(32, 139, 3, 3); ctx.fillRect(41, 139, 3, 3); }
        if (love >= 100) { ctx.fillStyle = '#4ea8de'; ctx.fillRect(230, 122, 60, 22); ctx.fillStyle = '#9ece6a'; ctx.fillRect(245, 120, 42, 6); }

        ctx.fillStyle = '#3e2723';
        for(let i = 0; i < poopCount; i++) { let px = 70 + (i * 30) + Math.sin(i * 10) * 10; let py = 165 + (i % 2) * 8; ctx.fillRect(px, py, 6, 4); }

        // 💡 リアルな「呼吸」の計算（上下へのわずかなゆらぎ）
        const time = Date.now();
        const breathY = isDead ? 0 : Math.sin(time / 280) * 1.8;

        if (!isDead && ++blinkTimer > 130) {
            isBlinking = true;
            if (blinkTimer > 135) { isBlinking = false; blinkTimer = 0; }
        }

        // イラストの描画位置
        const imgX = 80;
        const imgY = 25 + breathY;
        const imgW = 150;
        const imgH = 150;

        // 足元のリアルな影
        ctx.fillStyle = 'rgba(30, 15, 10, 0.35)';
        ctx.beginPath(); ctx.ellipse(imgX + 75, 168, 45, 6, 0, 0, Math.PI*2); ctx.fill();

        // 1. 神様のイラスト画像をキャンバスに描画
        ctx.drawImage(nezumiImg, imgX, imgY, imgW, imgH);

        // 2. 💡 イラストの上にリアルタイムで「まばたき」を重ねる
        // 赤い瞳の位置（神様のイラストの顔のパーツの位置に合わせて座標を正確に指定）
        const leftEyeX = imgX + 70;
        const leftEyeY = imgY + 90;
        const rightEyeX = imgX + 88;
        const rightEyeY = imgY + 87;

        if (isDead) {
            // 死亡時は目を (x x) に隠す
            ctx.strokeStyle = '#555'; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.moveTo(leftEyeX-3, leftEyeY-3); ctx.lineTo(leftEyeX+3, leftEyeY+3); ctx.moveTo(leftEyeX+3, leftEyeY-3); ctx.lineTo(leftEyeX-3, leftEyeY+3); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(rightEyeX-3, rightEyeY-3); ctx.lineTo(rightEyeX+3, rightEyeY+3); ctx.moveTo(rightEyeX+3, rightEyeY-3); ctx.lineTo(rightEyeX-3, rightEyeY+3); ctx.stroke();
        } else if (isBlinking || isSick) {
            // まばたき時、または病気時はまぶた（白い肌色の特製ドット）を瞳の上に上書きして目を閉じさせる
            ctx.fillStyle = '#ffffff'; 
            ctx.beginPath(); ctx.ellipse(leftEyeX, leftEyeY, 5, 5, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(rightEyeX, rightEyeY, 5, 5, 0, 0, Math.PI*2); ctx.fill();
            // 細めた目のライン
            ctx.strokeStyle = '#d4b2b2'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(leftEyeX - 4, leftEyeY); ctx.lineTo(leftEyeX + 4, leftEyeY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(rightEyeX - 4, rightEyeY); ctx.lineTo(rightEyeX + 4, rightEyeY); ctx.stroke();
        }
    }

    function showScenario(key) {
        if(isDead) return;
        const s = scenarios[key];
        if (key === 'start' && nezumiName) {
            document.getElementById('dialogue-text').textContent = `「ボク、今日からきみの ${nezumiName} だよ！なかよし度が増えると、もっとハッピーになれるんだ。きみのこといっぱい教えてね！」`;
        } else {
            document.getElementById('dialogue-text').textContent = s.text;
        }
        if (s.state) { nezumiState = s.state; setTimeout(() => { if(!isDead) nezumiState = 'normal'; }, 2500); }
        if (s.loveBonus) { let oldLove = love; love += s.loveBonus; checkMilestones(oldLove, love); }

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        s.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn'; btn.textContent = opt.text;
            btn.onclick = () => { showScenario(opt.next); saveGame(); updateUI(); };
            container.appendChild(btn);
        });
    }

    function runLoop() { drawPremiumRealPixel(); requestAnimationFrame(runLoop); }

    // 起動
    updateCarOption();
    if (isDead) { triggerDeath(); } else if (nezumiName) { showScenario('start'); }
    updateUI();
    runLoop();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐹 ねずみのほっこりルーム</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #1e1e2f;
            color: #e0e0ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #game-container {
            width: 340px;
            background: #2a2a40;
            border: 3px solid #4e4e70;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        /* ステータスバー */
        #status-bar {
            display: flex;
            justify-content: space-between;
            background: #1a1a2e;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 12px;
        }
        .status-item { display: flex; align-items: center; gap: 4px; }
        .val { color: #ffb703; font-weight: bold; }

        /* お部屋画面（キャンバス） */
        #room-viewport {
            position: relative;
            width: 100%;
            height: 200px;
            background: #3d3d5c;
            border-radius: 12px;
            border: 2px solid #1a1a2e;
            overflow: hidden;
        }
        canvas #room-canvas {
            display: block;
        }

        /* 会話ウィンドウ */
        #dialogue-box {
            background: #1a1a2e;
            border: 2px solid #4e4e70;
            border-radius: 12px;
            padding: 12px;
            min-height: 75px;
        }
        #speaker-name {
            font-size: 11px;
            color: #88ccff;
            margin-bottom: 4px;
            font-weight: bold;
        }
        #dialogue-text {
            font-size: 13px;
            line-height: 1.5;
            color: #ffffff;
        }

        /* 選択肢・アクションエリア */
        #action-area {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .btn {
            background: #4e4e70;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            text-align: left;
            transition: background 0.2s;
        }
        .btn:hover { background: #64648c; }
        .btn:active { background: #3a3a54; }
        
        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .act-btn {
            text-align: center;
            background: #ffb703;
            color: #1e1e2f;
            font-weight: bold;
        }
        .act-btn:hover { background: #ffc947; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="status-bar">
        <div class="status-item">🤝 なかよし度: <span id="love-val" class="val">10</span></div>
        <div class="status-item">🧀 チーズの数: <span id="cheese-val" class="val">3</span></div>
    </div>

    <div id="room-viewport">
        <canvas id="room-canvas" width="306" height="200"></canvas>
    </div>

    <div id="dialogue-box">
        <div id="speaker-name">ネズミ</div>
        <div id="dialogue-text">「なにかお話しよっ！ボク、きみのこと もっと知りたいな。」</div>
    </div>

    <div id="action-area">
        <div id="options-container" style="display: flex; flex-direction: column; gap: 6px;">
            </div>
        <div class="action-row">
            <button class="btn act-btn" onclick="giveCheese()">🧀 チーズをあげる</button>
            <button class="btn act-btn" onclick="strokeHead()">👋 なでなでする</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('room-canvas');
    const ctx = canvas.getContext('2d');

    // ゲームデータ
    let love = 10;
    let cheese = 3;
    let nezumiState = 'normal'; // normal, happy, eating, sleep
    let nezumiX = 130;
    let nezumiY = 110;
    let pulseFactor = 0; // アニメーション用

    // 会話のシナリオデータ
    const scenarios = {
        start: {
            text: "「なにかお話しよっ！ボク、きみのこと もっと知りたいな。」",
            options: [
                { text: "「今日の調子はどう？」", next: "condition" },
                { text: "「好きな食べ物は？」", next: "food" }
            ]
        },
        condition: {
            text: "「きみが会いに来てくれたから、すっごく元気が出たよ！えへへ。」",
            loveBonus: 5,
            state: 'happy',
            options: [{ text: "「それはよかった！」", next: "start" }]
        },
        food: {
            text: "「やっぱり、黄色くてあま～い、とろけるチーズが一番好き！きみは何が好き？」",
            options: [
                { text: "「お肉が好きだよ」", next: "meat" },
                { text: "「甘いお菓子が好き」", next: "sweet" }
            ]
        },
        meat: {
            text: "「お肉！ワイルドだねぇ！ボクは食べられないけど、きみがいっぱい食べて元気なら嬉しいな！」",
            loveBonus: 5,
            state: 'happy',
            options: [{ text: "「ありがとう！」", next: "start" }]
        },
        sweet: {
            text: "「お菓子！いいよねぇ、クッキーのひとかけらでもボクにとっては大ごちそうなんだ！」",
            loveBonus: 8,
            state: 'happy',
            options: [{ text: "「今度分けてあげるね」", next: "start" }]
        }
    };

    // ネズミ（ピクセルアート風）を描画する関数
    function drawNezumi() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 背景：ほっこりしたお部屋の床と壁
        ctx.fillStyle = '#4a4a6a'; // 壁
        ctx.fillRect(0, 0, canvas.width, 140);
        ctx.fillStyle = '#6e5040'; // 木の床
        ctx.fillRect(0, 140, canvas.width, 60);
        
        // 敷物（ラグ）
        ctx.fillStyle = '#9ece6a';
        ctx.beginPath();
        ctx.ellipse(153, 160, 60, 20, 0, 0, Math.PI * 2);
        ctx.fill();

        // 呼吸アニメーションの計算
        pulseFactor = Math.sin(Date.now() / 200) * 2;

        // 32x32ピクセルアートをシミュレート（ドットの拡大描画）
        const pixelSize = 3; 
        
        // 耳
        ctx.fillStyle = '#ff9ebb'; // 耳の内側ピンク
        ctx.fillRect(nezumiX - 12, nezumiY - 12 + pulseFactor/2, 9, 9);
        ctx.fillRect(nezumiX + 24, nezumiY - 12 + pulseFactor/2, 9, 9);
        
        ctx.fillStyle = '#a9a9b3'; // 毛並みグレー
        ctx.fillRect(nezumiX - 15, nezumiY - 9 + pulseFactor/2, 6, 9);
        ctx.fillRect(nezumiX + 30, nezumiY - 9 + pulseFactor/2, 6, 9);

        // 体と頭
        ctx.fillRect(nezumiX - 6, nezumiY - 3 + pulseFactor, 33, 36); // 胴体
        ctx.fillRect(nezumiX, nezumiY - 9 + pulseFactor/2, 21, 15); // 頭

        // 白いお腹
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(nezumiX + 3, nezumiY + 12 + pulseFactor, 15, 18);

        // 状態に応じた顔の描画
        ctx.fillStyle = '#222222'; // 目と鼻の黒
        if (nezumiState === 'happy') {
            // にっこりおめめ (^^)
            ctx.strokeStyle = '#222222';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(nezumiX + 4, nezumiY, 2, Math.PI, 0, false);
            ctx.arc(nezumiX + 16, nezumiY, 2, Math.PI, 0, false);
            ctx.stroke();
            
            // 赤みのあるほっぺ
            ctx.fillStyle = '#ff6b6b';
            ctx.fillRect(nezumiX - 3, nezumiY + 3, 4, 4);
            ctx.fillRect(nezumiX + 20, nezumiY + 3, 4, 4);
        } else if (nezumiState === 'sleep') {
            // すやすや目 (--)
            ctx.fillRect(nezumiX + 2, nezumiY, 5, 2);
            ctx.fillRect(nezumiX + 14, nezumiY, 5, 2);
        } else {
            // 通常のまるいおめめ
            ctx.fillRect(nezumiX + 3, nezumiY - 2, 4, 4);
            ctx.fillRect(nezumiX + 14, nezumiY - 2, 4, 4);
        }

        // 鼻と口
        ctx.fillStyle = '#ff6b6b';
        ctx.fillRect(nezumiX + 9, nezumiY + 3, 3, 3); // 鼻
        
        // ひげ
        ctx.strokeStyle = '#d0d0d0';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(nezumiX - 4, nezumiY + 5); ctx.lineTo(nezumiX - 14, nezumiY + 3);
        ctx.moveTo(nezumiX - 4, nezumiY + 8); ctx.lineTo(nezumiX - 14, nezumiY + 9);
        ctx.moveTo(nezumiX + 25, nezumiY + 5); ctx.lineTo(nezumiX + 35, nezumiY + 3);
        ctx.moveTo(nezumiX + 25, nezumiY + 8); ctx.lineTo(nezumiX + 35, nezumiY + 9);
        ctx.stroke();

        // チーズを食べているときのエフェクト
        if (nezumiState === 'eating') {
            ctx.fillStyle = '#ffb703';
            ctx.fillRect(nezumiX + 6, nezumiY + 15, 9, 9); // 手元のチーズ
            // もぐもぐの星エフェクト
            ctx.fillStyle = '#ffffff';
            if (Math.floor(Date.now() / 150) % 2 === 0) {
                ctx.fillText("✨", nezumiX - 15, nezumiY);
                ctx.fillText("✨", nezumiX + 32, nezumiY + 20);
            }
        }
    }

    // シナリオ進行と選択肢ボタンの生成
    function showScenario(key) {
        const s = scenarios[key];
        document.getElementById('dialogue-text').textContent = s.text;
        
        if (s.state) {
            nezumiState = s.state;
            setTimeout(() => { nezumiState = 'normal'; }, 2000);
        }
        if (s.loveBonus) {
            love += s.loveBonus;
            document.getElementById('love-val').textContent = love;
        }

        const container = document.getElementById('options-container');
        container.innerHTML = ''; // クリア

        s.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.textContent = opt.text;
            btn.onclick = () => showScenario(opt.next);
            container.appendChild(btn);
        });
    }

    // アクション：チーズをあげる
    function giveCheese() {
        if (cheese > 0) {
            cheese--;
            love += 15;
            document.getElementById('cheese-val').textContent = cheese;
            document.getElementById('love-val').textContent = love;
            
            nezumiState = 'eating';
            document.getElementById('dialogue-text').textContent = "ネズミ「わぁぁ！大好きなチーズだ！もぐもぐ…すっごく美味しいよ、ありがとう！」";
            
            setTimeout(() => {
                nezumiState = 'normal';
                showScenario('start');
            }, 3000);
        } else {
            document.getElementById('dialogue-text').textContent = "ネズミ「チーズなくなっちゃったみたい。きみがいてくれるだけでボクは満足だよ！」";
        }
    }

    // アクション：なでなでする
    function strokeHead() {
        love += 3;
        document.getElementById('love-val').textContent = love;
        nezumiState = 'happy';
        document.getElementById('dialogue-text').textContent = "ネズミ「あはは、なでなで むずがゆいけど、あったかくて気持ちいいなぁ…」";
        
        // 3回に1回チーズを見つけてくれるほっこりイベント
        if (Math.random() < 0.33) {
            cheese++;
            document.getElementById('cheese-val').textContent = cheese;
            setTimeout(() => {
                document.getElementById('dialogue-text').textContent = "ネズミ「あ！お部屋のすみにチーズが落ちてるのを見つけたよ！きみにあげる！」";
            }, 1500);
        }

        setTimeout(() => {
            nezumiState = 'normal';
            showScenario('start');
        }, 3000);
    }

    // 定期的な描画ループ（アニメーション用）
    function loop() {
        drawNezumi();
        requestAnimationFrame(loop);
    }

    // ゲーム開始
    showScenario('start');
    loop();
</script>
</body>
</html>

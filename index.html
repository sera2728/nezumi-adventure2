<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title><h3>🐹 ねずみのほっこりルーム Ultimate</h3></title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #0d0d1a;
            color: #e0e0ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #game-container {
            width: 350px;
            background: #161626;
            border: 2px solid #2d2d44;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        #status-bar {
            display: flex;
            justify-content: space-between;
            background: #090911;
            padding: 10px 16px;
            border-radius: 14px;
            font-size: 13px;
            border: 1px solid #1f1f33;
        }
        .status-item { display: flex; align-items: center; gap: 6px; }
        .val { color: #ffb703; font-weight: bold; }

        #room-viewport {
            position: relative;
            width: 100%;
            height: 220px;
            background: #090911;
            border-radius: 16px;
            border: 1px solid #2d2d44;
            overflow: hidden;
        }
        canvas#room-canvas {
            display: block;
        }

        #dialogue-box {
            background: #090911;
            border: 1px solid #2d2d44;
            border-radius: 16px;
            padding: 14px;
            min-height: 85px;
        }
        #speaker-name {
            font-size: 12px;
            color: #ff758f;
            margin-bottom: 6px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        #dialogue-text {
            font-size: 13px;
            line-height: 1.6;
            color: #e2e8f0;
        }

        #action-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .btn {
            background: #212135;
            color: #f1f5f9;
            border: 1px solid #31314d;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            text-align: left;
            transition: all 0.2s;
        }
        .btn:hover { background: #2d2d49; border-color: #4e4e75; }
        .btn:active { background: #171726; }
        
        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .act-btn {
            text-align: center;
            background: linear-gradient(135deg, #ffb703, #ee9b00);
            color: #0d0d1a;
            font-weight: bold;
            border: none;
        }
        .act-btn:hover { background: linear-gradient(135deg, #ffc947, #ffb703); transform: translateY(-1px); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="status-bar">
        <div class="status-item">🤝 なかよし度: <span id="love-val" class="val">10</span></div>
        <div class="status-item">🧀 チーズの数: <span id="cheese-val" class="val">3</span></div>
    </div>

    <div id="room-viewport">
        <canvas id="room-canvas" width="310" height="220"></canvas>
    </div>

    <div id="dialogue-box">
        <div id="speaker-name">白ネズミ</div>
        <div id="dialogue-text">「なにかお話しよっ！ボク、きみのこと もっと知りたいな。」</div>
    </div>

    <div id="action-area">
        <div id="options-container" style="display: flex; flex-direction: column; gap: 8px;"></div>
        <div class="action-row">
            <button class="btn act-btn" onclick="giveCheese()">🧀 チーズをあげる</button>
            <button class="btn act-btn" onclick="strokeHead()">👋 なでなでする</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('room-canvas');
    const ctx = canvas.getContext('2d');

    let love = 10;
    let cheese = 3;
    let nezumiState = 'normal'; // normal, happy, eating
    let blinkTimer = 0;
    let isBlinking = false;

    const scenarios = {
        start: {
            text: "「なにかお話しよっ！ボク、きみのこと もっと知りたいな。」",
            options: [
                { text: "「今日の調子はどう？」", next: "condition" },
                { text: "「好きな食べ物は？」", next: "food" }
            ]
        },
        condition: {
            text: "「きみが会いに来てくれたから、すっごく元気が出たよ！えへへ。」",
            loveBonus: 5,
            state: 'happy',
            options: [{ text: "「それはよかった！」", next: "start" }]
        },
        food: {
            text: "「やっぱり、黄色くてあま～い、とろけるチーズが一番好き！きみは何が好き？」",
            options: [
                { text: "「お肉が好きだよ」", next: "meat" },
                { text: "「甘いお菓子が好き」", next: "sweet" }
            ]
        },
        meat: {
            text: "「お肉！ワイルドだねぇ！ボクは食べられないけど、きみがいっぱい食べて元気なら嬉しいな！」",
            loveBonus: 5,
            state: 'happy',
            options: [{ text: "「ありがとう！」", next: "start" }]
        },
        sweet: {
            text: "「お菓子！いいよねぇ、クッキーのひとかけらでもボクにとっては大ごちそうなんだ！」",
            loveBonus: 8,
            state: 'happy',
            options: [{ text: "「今度分けてあげるね」", next: "start" }]
        }
    };

    // 💡 究極のモフモフ毛並み（ファーレンダリング）システム
    function drawFurBall(x, y, rX, rY, furLength, density, colorBase) {
        ctx.save();
        ctx.strokeStyle = colorBase;
        ctx.lineWidth = 0.5;
        
        // 何千本もの細いリアルな毛並みを放射状に重ねて描画する
        for (let i = 0; i < density; i++) {
            let angle = (i / density) * Math.PI * 2;
            
            // 毛並みのランダムなばらつき（これでリアルな質感になる）
            let noise = Math.sin(i * 15.3) * 3;
            let currentLength = furLength + noise;
            
            // 体の楕円状のベース位置
            let startX = x + Math.cos(angle) * rX;
            let startY = y + Math.sin(angle) * rY;
            
            // 毛の生える方向（外側へ向けて少し曲げる）
            let endX = x + Math.cos(angle) * (rX + currentLength);
            let endY = y + Math.sin(angle) * (rY + currentLength) + 1; // 重力でわずかに下げる
            
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            ctx.stroke();
        }
        ctx.restore();
    }

    function drawUltimateNezumi() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 背景（リアルなグラデーションの部屋）
        let roomGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        roomGrad.addColorStop(0, '#10101f');
        roomGrad.addColorStop(0.65, '#1b1b2f');
        roomGrad.addColorStop(0.65, '#2b1a11'); // 木の床
        roomGrad.addColorStop(1, '#140c08');
        ctx.fillStyle = roomGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const time = Date.now();
        const breath = Math.sin(time / 280) * 1.5; // 呼吸の上下運動

        // まばたきカウント
        blinkTimer++;
        if (blinkTimer > 120) {
            isBlinking = true;
            if (blinkTimer > 125) { isBlinking = false; blinkTimer = 0; }
        }

        const cx = 155;
        const cy = 125 + breath;

        // 1. リアルな質感のピンクの長い尻尾
        ctx.strokeStyle = 'rgba(255, 194, 205, 0.7)';
        ctx.lineWidth = 3.5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(cx + 20, cy + 30);
        ctx.bezierCurveTo(cx + 55, cy + 35, cx + 75, cy + 5, cx + 70, cy - 15 + Math.sin(time/400)*3);
        ctx.stroke();

        // 2. リアルな質感の耳（ピンクの内側と白い毛並みの外側）
        const drawEarReal = (earX, earY, isLeft) => {
            ctx.fillStyle = '#e5e5f0'; // 耳の裏
            ctx.beginPath(); ctx.arc(earX, earY, 16, 0, Math.PI*2); ctx.fill();
            // 内側の皮膚
            let earGrad = ctx.createRadialGradient(earX, earY+2, 2, earX, earY+2, 12);
            earGrad.addColorStop(0, '#ffccd5');
            earGrad.addColorStop(0.8, '#ffa6b7');
            earGrad.addColorStop(1, 'transparent');
            ctx.fillStyle = earGrad;
            ctx.beginPath(); ctx.arc(earX, earY+2, 12, 0, Math.PI*2); ctx.fill();
        };
        drawEarReal(cx - 30, cy - 25, true);
        drawEarReal(cx + 30, cy - 25, false);

        // 3. 胴体の毛並み（内側から外側へグラデーション密度のファーを描画）
        drawFurBall(cx, cy + 15, 38, 30, 8, 350, 'rgba(230, 230, 240, 0.4)'); // 外側の薄い毛
        drawFurBall(cx, cy + 15, 34, 26, 6, 400, 'rgba(255, 255, 255, 0.8)'); // 本毛
        
        // 4. 頭の毛並み
        drawFurBall(cx, cy - 8, 26, 24, 6, 300, 'rgba(230, 230, 240, 0.4)');
        drawFurBall(cx, cy - 8, 22, 20, 5, 350, 'rgba(255, 255, 255, 0.9)');

        // 内側のソリッドな肉付け（透けないように中を白く塗る）
        ctx.fillStyle = '#fcfcfc';
        ctx.beginPath(); ctx.ellipse(cx, cy + 15, 35, 28, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(cx, cy - 8, 23, 21, 0, 0, Math.PI*2); ctx.fill();

        // 5. リアルな黒い瞳（絶対に線で繋がらないリアル独立描写）
        ctx.fillStyle = '#0f0f14';
        const exOffset = 12;
        const ey = cy - 10;

        if (isBlinking || nezumiState === 'sleep') {
            ctx.strokeStyle = '#8a8a99';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(cx - exOffset - 4, ey); ctx.lineTo(cx - exOffset + 4, ey);
            ctx.moveTo(cx + exOffset - 4, ey); ctx.lineTo(cx + exOffset + 4, ey);
            ctx.stroke();
        } else if (nezumiState === 'happy') {
            // 嬉しそうに細められたリアルな半月目の形
            ctx.beginPath(); ctx.arc(cx - exOffset, ey + 2, 4, Math.PI, 0, false); ctx.fill();
            ctx.beginPath(); ctx.arc(cx + exOffset, ey + 2, 4, Math.PI, 0, false); ctx.fill();
        } else {
            // 通常の潤んだ大きな目
            ctx.beginPath(); ctx.arc(cx - exOffset, ey, 4.5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx + exOffset, ey, 4.5, 0, Math.PI*2); ctx.fill();
            // 本物っぽい光の映り込み（ハイライト）
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(cx - exOffset - 1.5, ey - 1.5, 1.2, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx + exOffset - 1.5, ey - 1.5, 1.2, 0, Math.PI*2); ctx.fill();
        }

        // 6. リアルなピンクの鼻とマズル
        ctx.fillStyle = '#ff9ebb';
        ctx.beginPath();
        ctx.moveTo(cx - 2, cy - 1); ctx.lineTo(cx + 2, cy - 1); ctx.lineTo(cx, cy + 1.5);
        ctx.closePath(); ctx.fill();

        // リアルなヒゲ（非常に細く、シャープに描く）
        ctx.strokeStyle = 'rgba(200, 200, 220, 0.4)';
        ctx.lineWidth = 0.7;
        ctx.beginPath();
        let piku = Math.sin(time / 70) * (nezumiState === 'happy' ? 2 : 0.5);
        ctx.moveTo(cx - 4, cy + 1); ctx.lineTo(cx - 36, cy - 2 + piku);
        ctx.moveTo(cx - 4, cy + 3); ctx.lineTo(cx - 40, cy + 4 - piku);
        ctx.moveTo(cx + 4, cy + 1); ctx.lineTo(cx + 36, cy - 2 - piku);
        ctx.moveTo(cx + 4, cy + 3); ctx.lineTo(cx + 40, cy + 4 + piku);
        ctx.stroke();

        // 7. 手元のシチュエーション（チーズおねだり・食べる）
        ctx.fillStyle = '#ffccd5'; // 前足ピンク
        if (nezumiState === 'eating') {
            // 黄色い立体的なチーズの塊を描写
            ctx.fillStyle = '#ffb703';
            ctx.beginPath(); ctx.moveTo(cx - 8, cy + 16); ctx.lineTo(cx + 8, cy + 14); ctx.lineTo(cx, cy + 26); ctx.closePath(); ctx.fill();
            // チーズの穴
            ctx.fillStyle = '#fb8500';
            ctx.beginPath(); ctx.arc(cx - 2, cy + 18, 1.5, 0, Math.PI*2); ctx.fill();
            
            // チーズを掴む小さなおてて
            ctx.fillStyle = '#ffccd5';
            ctx.beginPath(); ctx.arc(cx - 6, cy + 16, 3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx + 6, cy + 16, 3, 0, Math.PI*2); ctx.fill();
        } else {
            // 通常時のちょこんとした前足
            ctx.beginPath(); ctx.ellipse(cx - 12, cy + 16, 3, 4, Math.PI/4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(cx + 12, cy + 16, 3, 4, -Math.PI/4, 0, Math.PI*2); ctx.fill();
        }
    }

    function showScenario(key) {
        const s = scenarios[key];
        document.getElementById('dialogue-text').textContent = s.text;
        
        if (s.state) {
            nezumiState = s.state;
            setTimeout(() => { nezumiState = 'normal'; }, 2500);
        }
        if (s.loveBonus) {
            love += s.loveBonus;
            document.getElementById('love-val').textContent = love;
        }

        const container = document.getElementById('options-container');
        container.innerHTML = '';

        s.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.textContent = opt.text;
            btn.onclick = () => showScenario(opt.next);
            container.appendChild(btn);
        });
    }

    function giveCheese() {
        if (cheese > 0) {
            cheese--;
            love += 15;
            document.getElementById('cheese-val').textContent = cheese;
            document.getElementById('love-val').textContent = love;
            
            nezumiState = 'eating';
            document.getElementById('dialogue-text').textContent = "白ネズミ「わぁぁ！大好きなチーズだ！両手で持って…もぐもぐ。すっごく美味しいよ、ありがとう！」";
            
            setTimeout(() => {
                nezumiState = 'normal';
                showScenario('start');
            }, 3500);
        } else {
            document.getElementById('dialogue-text').textContent = "白ネズミ「チーズなくなっちゃったみたい。きみが側にいてくれるだけで、ボクは胸がいっぱいだよ。」";
        }
    }

    function strokeHead() {
        love += 3;
        document.getElementById('love-val').textContent = love;
        nezumiState = 'happy';
        document.getElementById('dialogue-text').textContent = "白ネズミ「あはは、きみの手、おっきくてあったかいねぇ…頭をなでられるの、大好き。」";
        
        if (Math.random() < 0.35) {
            cheese++;
            document.getElementById('cheese-val').textContent = cheese;
            setTimeout(() => {
                document.getElementById('dialogue-text').textContent = "白ネズミ「あ！お部屋のすみにクッキーのかけらを見つけたよ！はい、きみにプレゼント！」";
            }, 1800);
        }

        setTimeout(() => {
            nezumiState = 'normal';
            showScenario('start');
        }, 3500);
    }

    function renderLoop() {
        drawUltimateNezumi();
        requestAnimationFrame(renderLoop);
    }

    // ゲーム開始
    showScenario('start');
    renderLoop();
</script>
</body>
</html>

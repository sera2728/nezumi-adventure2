<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐹 ねずみのほっこりルーム DX Premium</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #0d0d1a;
            color: #e0e0ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #game-container {
            width: 350px;
            background: #161626;
            border: 2px solid #2d2d44;
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        /* 📊 メインステータス */
        #status-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            background: #090911;
            padding: 10px;
            border-radius: 14px;
            font-size: 11px;
            border: 1px solid #1f1f33;
        }
        .status-item { display: flex; align-items: center; gap: 4px; }
        .val { color: #ffb703; font-weight: bold; }
        .alert-val { color: #ff4d6d; font-weight: bold; }

        /* 🧬 生体パラメータバー */
        #vitals-panel {
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: #090911;
            padding: 8px 12px;
            border-radius: 14px;
            font-size: 11px;
        }
        .vital-row { display: flex; justify-content: space-between; align-items: center; }
        .progress-bg { width: 180px; height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
        .progress-bar { height: 100%; width: 100%; transition: width 0.3s, background-color 0.3s; }

        #room-viewport {
            position: relative;
            width: 100%;
            height: 220px;
            background: #090911;
            border-radius: 16px;
            border: 1px solid #2d2d44;
            overflow: hidden;
        }
        canvas#room-canvas {
            display: block;
        }

        #dialogue-box {
            background: #090911;
            border: 1px solid #2d2d44;
            border-radius: 16px;
            padding: 12px;
            min-height: 75px;
        }
        #speaker-name {
            font-size: 12px;
            color: #ff758f;
            margin-bottom: 4px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        #dialogue-text {
            font-size: 13px;
            line-height: 1.5;
            color: #e2e8f0;
        }

        #action-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .btn {
            background: #212135;
            color: #f1f5f9;
            border: 1px solid #31314d;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            text-align: left;
            transition: all 0.2s;
        }
        .btn:hover { background: #2d2d49; border-color: #4e4e75; }
        .btn:disabled { background: #11111a; color: #555; border-color: #222; cursor: not-allowed; }
        
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .act-btn {
            text-align: center;
            background: linear-gradient(135deg, #ffb703, #ee9b00);
            color: #0d0d1a;
            font-weight: bold;
            border: none;
            padding: 8px;
            font-size: 12px;
        }
        .act-btn:hover:not(:disabled) { background: linear-gradient(135deg, #ffc947, #ffb703); transform: translateY(-1px); }
        .clean-btn { background: linear-gradient(135deg, #20b2aa, #008080); color: white; }
        .clean-btn:hover:not(:disabled) { background: linear-gradient(135deg, #33cccc, #20b2aa); }
        .med-btn { background: linear-gradient(135deg, #ff4d6d, #c9184a); color: white; }
        .med-btn:hover:not(:disabled) { background: linear-gradient(135deg, #ff758f, #ff4d6d); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="status-bar">
        <div class="status-item">🤝 なかよし: <span id="love-val" class="val">10</span></div>
        <div class="status-item">🧀 チーズ: <span id="cheese-val" class="val">3</span></div>
        <div class="status-item">💩 部屋のふん: <span id="poop-val" class="val">0 / 5</span></div>
        <div class="status-item">⚠️ 状態: <span id="condition-val" class="val">健康</span></div>
    </div>

    <div id="vitals-panel">
        <div class="vital-row">
            <span>🍖 お腹の満足度</span>
            <div class="progress-bg"><div id="hunger-bar" class="progress-bar" style="background: #9ece6a;"></div></div>
        </div>
        <div class="vital-row">
            <span>💧 のどの潤い</span>
            <div class="progress-bg"><div id="thirst-bar" class="progress-bar" style="background: #4ea8de;"></div></div>
        </div>
    </div>

    <div id="room-viewport">
        <canvas id="room-canvas" width="314" height="200"></canvas>
    </div>

    <div id="dialogue-box">
        <div id="speaker-name">白ネズミ</div>
        <div id="dialogue-text">「なにかお話しよっ！ボク、きみのこと もっと知りたいな。」</div>
    </div>

    <div id="action-area">
        <div id="options-container" style="display: flex; flex-direction: column; gap: 6px;"></div>
        
        <div class="action-grid">
            <button id="cmd-cheese" class="btn act-btn" onclick="giveCheese()">🧀 チーズをあげる</button>
            <button id="cmd-water" class="btn act-btn" style="background: linear-gradient(135deg, #4ea8de, #0077b6); color: white;" onclick="giveWater()">💧 水をあげる</button>
            <button id="cmd-stroke" class="btn act-btn" onclick="strokeHead()">👋 なでなでする</button>
            <button id="cmd-clean" class="btn act-btn clean-btn" onclick="cleanRoom()">🧹 部屋を掃除する</button>
            <button id="cmd-med" class="btn act-btn med-btn" style="grid-column: span 2; display: none;" onclick="giveMedicine()">💊 薬を飲ませる</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('room-canvas');
    const ctx = canvas.getContext('2d');

    // 💡 ゲームを閉じても数値を記憶するセーブデータ機能
    let love = parseInt(localStorage.getItem('nezumi_love')) || 10;
    let cheese = parseInt(localStorage.getItem('nezumi_cheese')) || 3;
    let poopCount = parseInt(localStorage.getItem('nezumi_poop')) || 0;
    let isSick = localStorage.getItem('nezumi_sick') === 'true';
    let isDead = localStorage.getItem('nezumi_dead') === 'true';

    // 💡 「3日で100から0になる」リアルタイム時間の計算
    let lastTime = parseInt(localStorage.getItem('nezumi_last_time')) || Date.now();
    let now = Date.now();
    let elapsedSeconds = (now - lastTime) / 1000;

    // 1秒あたりに減る量（3日間 = 259,200秒で100減る計算）
    const decayPerSecondHunger = 100 / 259200; 
    const decayPerSecondThirst = 100 / 172800; // のどは2日でカラカラ（ちょっと早め）

    let hunger = parseFloat(localStorage.getItem('nezumi_hunger'));
    if (isNaN(hunger)) hunger = 100;
    let thirst = parseFloat(localStorage.getItem('nezumi_thirst'));
    if (isNaN(thirst)) thirst = 100;

    // オフライン（放置していた時間）の分のパラメータを減らす
    if (!isDead) {
        hunger = Math.max(0, hunger - (elapsedSeconds * decayPerSecondHunger));
        thirst = Math.max(0, thirst - (elapsedSeconds * decayPerSecondThirst));
        
        // 放置時間に応じてふんがたまる（最大5個）
        let newPoops = Math.floor(elapsedSeconds / 43200); // 12時間に1個ふんをする
        if (hunger > 10) {
            poopCount = Math.min(5, poopCount + newPoops);
        }

        // 病気判定
        if (poopCount >= 3 && !isSick && Math.random() < 0.3) {
            isSick = true;
        }

        // 死亡判定
        if (hunger <= 0 || thirst <= 0) {
            isDead = true;
        }
    }

    // 今の時間を保存
    localStorage.setItem('nezumi_last_time', now);

    let nezumiState = 'normal'; 
    let blinkTimer = 0;
    let isBlinking = false;

    const scenarios = {
        start: {
            text: "「なにかお話しよっ！ボク、きみのこと もっと知りたいな。」",
            options: [
                { text: "「今日の調子はどう？」", next: "condition" },
                { text: "「好きな食べ物は？」", next: "food" },
                { text: "「お部屋の住み心地は？」", next: "room" },
                { text: "「ボクの名前をつけてあげようか？」", next: "name_event" },
                { text: "「普段は何して遊んでるの？」", next: "play_event" }
            ]
        },
        condition: {
            text: "「きみが会いに来てくれたから、すっごく元気が出たよ！えへへ。」",
            loveBonus: 5,
            state: 'happy',
            options: [{ text: "「それはよかった！」", next: "start" }]
        },
        food: {
            text: "「やっぱり、黄色くてあま～い、とろけるチーズが一番好き！きみは何が好き？」",
            options: [
                { text: "「お肉が好きだよ」", next: "meat" },
                { text: "「甘いお菓子が好き」", next: "sweet" }
            ]
        },
        meat: {
            text: "「お肉！ワイルドだねぇ！ボクは食べられないけど、きみがいっぱい食べて元気なら嬉しいな！」",
            loveBonus: 5,
            state: 'happy',
            options: [{ text: "「ありがとう！」", next: "start" }]
        },
        sweet: {
            text: "「お菓子！いいよねぇ、クッキーのひとかけらでもボクにとっては大ごちそうんだ！」",
            loveBonus: 8,
            state: 'happy',
            options: [{ text: "「今度分けてあげるね」", next: "start" }]
        },
        room: {
            text: "「この木のお部屋、あったかくて大好きなんだ！でも…きみが新しい家具とか置いてくれたら、もっと嬉しいかも！」",
            options: [
                { text: "「今度ふかふかのベッドを買ってあげる」", next: "room_bed" },
                { text: "「おもちゃの車とかどう？」", next: "room_toy" }
            ]
        },
        room_bed: {
            text: "「わぁっ、ふかふかのベッド！？そこで丸くなって寝たら絶対に幸せだなぁ…楽しみ！」",
            loveBonus: 10,
            state: 'happy',
            options: [{ text: "「楽しみにしててね」", next: "start" }]
        },
        room_toy: {
            text: "「おもちゃの車！それに乗って、このお部屋を大冒険するんだね！ワクワクしちゃうな！」",
            loveBonus: 7,
            state: 'happy',
            options: [{ text: "「いっぱい遊んでね」", next: "start" }]
        },
        name_event: {
            text: "「えっ、ボクに名前をつけてくれるの！？どんな名前が良いかなぁ、ドキドキしちゃう…！」",
            options: [
                { text: "「白いから『ユキマル』はどう？」", next: "name_yuki" },
                { text: "「小さくて可愛いから『大福』は？」", next: "name_daifuku" }
            ]
        },
        name_yuki: {
            text: "「ユキマル……！カッコよくて、とっても綺麗で素敵な名前だね！ボク、今日からユキマルになる！」",
            loveBonus: 12,
            state: 'happy',
            options: [{ text: "「よろしくね、ユキマル」", next: "start" }]
        },
        name_daifuku: {
            text: "「だいふく！？もちもちで美味しそうな名前だね！きみがボクをおいしそうって思ってくれてるなら嬉しいな！」",
            loveBonus: 10,
            state: 'happy',
            options: [{ text: "「可愛い名前でしょ、よろしくね」", next: "start" }]
        },
        play_event: {
            text: "「普段はね、お部屋のすみをクンクン探検したり、しっぽを追いかけてグルグル回ったりしてるよ。きみは普段何して遊んでるの？」",
            options: [
                { text: "「ゲームをして遊んでるよ」", next: "play_game" },
                { text: "「お外をのんびりお散歩してるよ」", next: "play_walk" }
            ]
        },
        play_game: {
            text: "「ゲーム！今ボクときみがこうやって遊んでるのもゲームなのかな？きみと同じ遊びができてボク幸せだよ！」",
            loveBonus: 10,
            state: 'happy',
            options: [{ text: "「これからも一緒に遊ぼう」", next: "start" }]
        },
        play_walk: {
            text: "「お散歩！お外の世界ってどんなに広いんだろう。いつかきみのポケットに入って、一緒にお外を見てみたいな！」",
            loveBonus: 8,
            state: 'happy',
            options: [{ text: "「いつか一緒に行こうね」", next: "start" }]
        }
    };

    // 💡 15秒に1回、画面が開いている間も超のんびりゲージを減らす
    setInterval(() => {
        if (isDead) return;

        hunger = Math.max(0, hunger - (15 * decayPerSecondHunger));
        thirst = Math.max(0, thirst - (15 * decayPerSecondThirst));

        if (hunger > 20 && Math.random() < 0.005) { 
            poopCount = Math.min(5, poopCount + 1);
        }

        if (poopCount >= 3 && !isSick && Math.random() < 0.02) {
            isSick = true;
            nezumiState = 'normal';
        }

        if (hunger <= 0 || thirst <= 0) {
            triggerDeath();
        }

        saveGame();
        updateUI();
    }, 15000);

    function saveGame() {
        localStorage.setItem('nezumi_love', love);
        localStorage.setItem('nezumi_cheese', cheese);
        localStorage.setItem('nezumi_hunger', hunger);
        localStorage.setItem('nezumi_thirst', thirst);
        localStorage.setItem('nezumi_poop', poopCount);
        localStorage.setItem('nezumi_sick', isSick);
        localStorage.setItem('nezumi_dead', isDead);
        localStorage.setItem('nezumi_last_time', Date.now());
    }

    function updateUI() {
        document.getElementById('love-val').textContent = love;
        document.getElementById('cheese-val').textContent = cheese;
        document.getElementById('poop-val').textContent = `${poopCount} / 5`;
        
        document.getElementById('hunger-bar').style.width = hunger + '%';
        document.getElementById('thirst-bar').style.width = thirst + '%';
        document.getElementById('hunger-bar').style.backgroundColor = hunger < 25 ? '#ff4d6d' : '#9ece6a';
        document.getElementById('thirst-bar').style.backgroundColor = thirst < 25 ? '#ff4d6d' : '#4ea8de';

        if (isDead) {
            document.getElementById('condition-val').textContent = "死亡";
            document.getElementById('condition-val').className = "alert-val";
            document.getElementById('cmd-med').style.display = "none";
        } else if (isSick) {
            document.getElementById('condition-val').textContent = "病気";
            document.getElementById('condition-val').className = "alert-val";
            document.getElementById('cmd-med').style.display = "block";
        } else {
            document.getElementById('condition-val').textContent = "健康";
            document.getElementById('condition-val').className = "val";
            document.getElementById('cmd-med').style.display = "none";
        }
    }

    function triggerDeath() {
        isDead = true;
        saveGame();
        updateUI();
        document.getElementById('speaker-name').textContent = "システム";
        document.getElementById('dialogue-text').textContent = "白ネズミは天国へ旅立ってしまったようです。";
        document.querySelectorAll('.btn, .act-btn').forEach(b => b.disabled = true);
        document.getElementById('options-container').innerHTML = '<button class="btn act-btn" style="text-align:center;" onclick="resetGame()">新しく飼い直す（リセット）</button>';
    }

    function resetGame() {
        localStorage.clear();
        location.reload();
    }

    function cleanRoom() {
        if(isDead) return;
        poopCount = 0;
        document.getElementById('dialogue-text').textContent = "白ネズミ「お部屋がピカピカになった！神様、お掃除ありがとう！」";
        saveGame(); updateUI();
    }

    function giveMedicine() {
        if(isDead || !isSick) return;
        isSick = false;
        nezumiState = 'happy';
        document.getElementById('dialogue-text').textContent = "白ネズミ「お薬苦かったけど、元気になったよ！ありがとう！」";
        saveGame(); updateUI();
    }

    function giveWater() {
        if(isDead) return;
        thirst = Math.min(100, thirst + 40);
        nezumiState = 'happy';
        document.getElementById('dialogue-text').textContent = "白ネズミ「お水美味しい！のどのカラカラが治ったよ！」";
        saveGame(); updateUI();
    }

    function giveCheese() {
        if(isDead) return;
        if (cheese > 0) {
            cheese--;
            love += 15;
            hunger = Math.min(100, hunger + 40);
            nezumiState = 'eating';
            document.getElementById('dialogue-text').textContent = "白ネズミ「大好きなチーズだ！もぐもぐ…お腹いっぱい！」";
            setTimeout(() => { nezumiState = 'normal'; showScenario('start'); }, 3500);
            saveGame(); updateUI();
        } else {
            document.getElementById('dialogue-text').textContent = "白ネズミ「チーズなくなっちゃったみたい。きみが側にいてくれるだけで満足だよ！」";
        }
    }

    function strokeHead() {
        if(isDead) return;
        love += 3;
        nezumiState = 'happy';
        document.getElementById('dialogue-text').textContent = "白ネズミ「頭をなでられるの、あったかくて大好き…」";
        if (Math.random() < 0.2) {
            cheese++;
            setTimeout(() => { document.getElementById('dialogue-text').textContent = "白ネズミ「あ！お部屋のすみにチーズが落ちてたよ！はい、きみにプレゼント！」"; }, 1800);
        }
        setTimeout(() => { nezumiState = 'normal'; showScenario('start'); }, 3500);
        saveGame(); updateUI();
    }

    // 💡 見た目キープの最高ドット絵エンジン
    function drawPremiumRealPixel() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        let wallGrad = ctx.createLinearGradient(0, 0, 0, 130);
        wallGrad.addColorStop(0, '#e3d8d4'); wallGrad.addColorStop(1, '#b0bec5');
        ctx.fillStyle = wallGrad; ctx.fillRect(0, 0, canvas.width, 130);
        ctx.fillStyle = 'rgba(141, 110, 99, 0.12)';
        for(let i = 0; i < canvas.width; i += 24) ctx.fillRect(i, 0, 2, 130);
        
        let floorGrad = ctx.createLinearGradient(0, 130, 0, canvas.height);
        floorGrad.addColorStop(0, '#8d6e63'); floorGrad.addColorStop(1, '#4e342e');
        ctx.fillStyle = floorGrad; ctx.fillRect(0, 130, canvas.width, 70);
        ctx.fillStyle = 'rgba(46, 26, 21, 0.3)';
        for(let y = 130; y < canvas.height; y += 14) ctx.fillRect(0, y, canvas.width, 1);

        // ふん
        ctx.fillStyle = '#3e2723';
        for(let i = 0; i < poopCount; i++) {
            let px = 30 + (i * 35) + Math.sin(i * 10) * 10;
            let py = 160 + (i % 2) * 12;
            ctx.fillRect(px, py, 6, 4); ctx.fillRect(px + 1, py - 2, 4, 2);
        }

        const time = Date.now();
        const breath = isDead ? 0 : Math.sin(time / 230) * 1.5;

        if (!isDead && ++blinkTimer > 110) {
            isBlinking = true;
            if (blinkTimer > 114) { isBlinking = false; blinkTimer = 0; }
        }

        const bx = 110;
        const by = 135 + breath;

        ctx.fillStyle = 'rgba(30, 15, 10, 0.4)';
        ctx.beginPath(); ctx.ellipse(bx + 28, by + 22, 28, 5, 0, 0, Math.PI*2); ctx.fill();

        // しっぽ
        ctx.strokeStyle = '#f4c2c2'; ctx.lineWidth = 3; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(bx + 55, by + 10);
        ctx.bezierCurveTo(bx + 85, by + 15, bx + 100, by - 15, bx + 95, by - 30 + (isDead ? 0 : Math.sin(time/350)*4));
        ctx.stroke();

        // 後ろ足
        ctx.beginPath(); ctx.fillStyle = '#dedee8'; ctx.ellipse(bx + 40, by + 12, 16, 12, Math.PI/6, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ffccd5'; ctx.fillRect(bx + 44, by + 22, 10, 4);

        // 胴体
        ctx.fillStyle = '#ffffff';
        for(let i=0; i<36; i+=2) { ctx.fillRect(bx + i * 0.2, by - 10 + i, 45 + (i * 0.4), 2); }
        let bodyColors = isSick ? ['#f0f0f5', '#e1e1ed', '#cbd5e1', '#b8b8c7'] : ['#ffffff', '#f2f2fa', '#e1e1ed', '#d2d2e3', '#c2c2d6'];
        for(let i=0; i<36; i+=2) {
            ctx.fillStyle = bodyColors[Math.min(Math.floor(i/7), bodyColors.length-1)];
            ctx.fillRect(bx + i * 0.2, by - 10 + i, 45 + (i * 0.4), 2);
        }

        // 奥耳
        const drawRealEar = (ex, ey, innerColor, outerColor) => {
            ctx.fillStyle = outerColor; ctx.beginPath(); ctx.ellipse(ex, ey, 15, 17, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = innerColor; ctx.beginPath(); ctx.ellipse(ex, ey + 1, 11, 13, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = isSick ? '#c97a8b' : '#e899a8'; ctx.beginPath(); ctx.ellipse(ex - 1, ey + 3, 7, 8, 0, 0, Math.PI*2); ctx.fill();
        };
        drawRealEar(bx + 12, by - 28, '#ffccd5', '#e6e6f2');

        // 頭部
        ctx.fillStyle = '#ffffff';
        for(let i=0; i<24; i+=2) { ctx.fillRect(bx - 12 + i * 0.6, by - 18 + i, 24 + i, 2); }
        let headColors = isSick ? ['#f5f5fa', '#e6e6f2', '#c2c2d6'] : ['#fcfcfc', '#f5f5fa', '#e6e6f2', '#d7d7eb'];
        for(let i=0; i<24; i+=2) {
            ctx.fillStyle = headColors[Math.min(Math.floor(i/6), headColors.length-1)];
            ctx.fillRect(bx - 12 + i * 0.6, by - 18 + i, 24 + i, 2);
        }

        drawRealEar(bx + 26, by - 24, '#ffccd5', '#f5f5fa');

        // 瞳
        const ey = by - 7, ex = bx + 16;
        if (isDead) {
            ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(ex-3, ey-3); ctx.lineTo(ex+3, ey+3); ctx.moveTo(ex+3, ey-3); ctx.lineTo(ex-3, ey+3); ctx.stroke();
        } else if (isBlinking || isSick) {
            ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(ex - 3, ey); ctx.lineTo(ex + 3, ey); ctx.stroke();
        } else if (nezumiState === 'happy') {
            ctx.strokeStyle = '#11111a'; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.arc(ex, ey + 1, 3, Math.PI, 0, false); ctx.stroke();
        } else {
            ctx.fillStyle = '#11111a'; ctx.beginPath(); ctx.arc(ex, ey, 4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(ex - 1, ey - 1, 1.2, 0, Math.PI*2); ctx.fill();
        }

        // 鼻・ひげ
        ctx.fillStyle = isSick ? '#e57373' : '#ff9ebb'; ctx.fillRect(bx - 14, by + 2, 4, 3);
        ctx.strokeStyle = 'rgba(70, 70, 90, 0.4)'; ctx.lineWidth = 0.8; ctx.beginPath();
        let piku = isDead ? 0 : Math.sin(time / 60) * 0.8;
        ctx.moveTo(bx - 10, by + 3); ctx.lineTo(bx - 32, by - 1 + piku);
        ctx.moveTo(bx - 10, by + 4); ctx.lineTo(bx - 35, by + 5 - piku);
        ctx.stroke();

        // 前足
        ctx.fillStyle = '#ffccd5';
        if (nezumiState === 'eating') {
            ctx.fillStyle = '#ffb703'; ctx.fillRect(bx - 2, by + 14, 12, 10);
            ctx.fillStyle = '#ffccd5'; ctx.fillRect(bx - 4, by + 14, 4, 4); ctx.fillRect(bx + 8, by + 14, 4, 4);
        } else {
            ctx.fillRect(bx + 4, by + 15, 5, 4); ctx.fillRect(bx + 14, by + 15, 4, 4);
        }
        ctx.fillRect(bx + 8, by + 23, 6, 3);
    }

    function showScenario(key) {
        if(isDead) return;
        const s = scenarios[key];
        document.getElementById('dialogue-text').textContent = s.text;
        if (s.state) { nezumiState = s.state; setTimeout(() => { if(!isDead) nezumiState = 'normal'; }, 2500); }
        if (s.loveBonus) { love += s.loveBonus; }

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        s.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn'; btn.textContent = opt.text;
            btn.onclick = () => { showScenario(opt.next); saveGame(); updateUI(); };
            container.appendChild(btn);
        });
    }

    function runLoop() {
        drawPremiumRealPixel();
        requestAnimationFrame(runLoop);
    }

    if (isDead) {
        triggerDeath();
    } else {
        showScenario('start');
    }
    updateUI();
    runLoop();
</script>
</body>
</html>

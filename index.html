<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐹 ねずみのほっこりルーム Pixel Premium</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #0d0d1a;
            color: #e0e0ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #game-container {
            width: 350px;
            background: #161626;
            border: 2px solid #2d2d44;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        #status-bar {
            display: flex;
            justify-content: space-between;
            background: #090911;
            padding: 10px 16px;
            border-radius: 14px;
            font-size: 13px;
            border: 1px solid #1f1f33;
        }
        .status-item { display: flex; align-items: center; gap: 6px; }
        .val { color: #ffb703; font-weight: bold; }

        #room-viewport {
            position: relative;
            width: 100%;
            height: 220px;
            background: #090911;
            border-radius: 16px;
            border: 1px solid #2d2d44;
            overflow: hidden;
        }
        canvas#room-canvas {
            display: block;
        }

        #dialogue-box {
            background: #090911;
            border: 1px solid #2d2d44;
            border-radius: 16px;
            padding: 14px;
            min-height: 85px;
        }
        #speaker-name {
            font-size: 12px;
            color: #ff758f;
            margin-bottom: 6px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        #dialogue-text {
            font-size: 13px;
            line-height: 1.6;
            color: #e2e8f0;
        }

        #action-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .btn {
            background: #212135;
            color: #f1f5f9;
            border: 1px solid #31314d;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            text-align: left;
            transition: all 0.2s;
        }
        .btn:hover { background: #2d2d49; border-color: #4e4e75; }
        .btn:active { background: #171726; }
        
        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .act-btn {
            text-align: center;
            background: linear-gradient(135deg, #ffb703, #ee9b00);
            color: #0d0d1a;
            font-weight: bold;
            border: none;
        }
        .act-btn:hover { background: linear-gradient(135deg, #ffc947, #ffb703); transform: translateY(-1px); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="status-bar">
        <div class="status-item">🤝 なかよし度: <span id="love-val" class="val">10</span></div>
        <div class="status-item">🧀 チーズの数: <span id="cheese-val" class="val">3</span></div>
    </div>

    <div id="room-viewport">
        <canvas id="room-canvas" width="310" height="220"></canvas>
    </div>

    <div id="dialogue-box">
        <div id="speaker-name">白ネズミ</div>
        <div id="dialogue-text">「なにかお話しよっ！ボク、きみのこと もっと知りたいな。」</div>
    </div>

    <div id="action-area">
        <div id="options-container" style="display: flex; flex-direction: column; gap: 8px;"></div>
        <div class="action-row">
            <button class="btn act-btn" onclick="giveCheese()">🧀 チーズをあげる</button>
            <button class="btn act-btn" onclick="strokeHead()">👋 なでなでする</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('room-canvas');
    const ctx = canvas.getContext('2d');

    let love = 10;
    let cheese = 3;
    let nezumiState = 'normal'; 
    let blinkTimer = 0;
    let isBlinking = false;

    const scenarios = {
        start: {
            text: "「なにかお話しよっ！ボク、きみのこと もっと知りたいな。」",
            options: [
                { text: "「今日の調子はどう？」", next: "condition" },
                { text: "「好きな食べ物は？」", next: "food" }
            ]
        },
        condition: {
            text: "「きみが会いに来てくれたから、すっごく元気が出たよ！えへへ。」",
            loveBonus: 5,
            state: 'happy',
            options: [{ text: "「それはよかった！」", next: "start" }]
        },
        food: {
            text: "「やっぱり、黄色くてあま～い、とろけるチーズが一番好き！きみは何が好き？」",
            options: [
                { text: "「お肉が好きだよ」", next: "meat" },
                { text: "「甘いお菓子が好き」", next: "sweet" }
            ]
        },
        meat: {
            text: "「お肉！ワイルドだねぇ！ボクは食べられないけど、きみがいっぱい食べて元気なら嬉しいな！」",
            loveBonus: 5,
            state: 'happy',
            options: [{ text: "「ありがとう！」", next: "start" }]
        },
        sweet: {
            text: "「お菓子！いいよねぇ、クッキーのひとかけらでもボクにとっては大ごちそうなんだ！」",
            loveBonus: 8,
            state: 'happy',
            options: [{ text: "「今度分けてあげるね」", next: "start" }]
        }
    };

    // 💡 ドットの粒を揃えて描画するピクセル補助関数
    function drawPixelBlock(x, y, w, h, color) {
        ctx.fillStyle = color;
        ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
    }

    function drawPixelNezumi() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 背景：ドット絵風グラデーションの部屋
        let roomGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        roomGrad.addColorStop(0, '#10101f');
        roomGrad.addColorStop(0.65, '#1b1b2f');
        roomGrad.addColorStop(0.65, '#2b1a11'); // 床
        roomGrad.addColorStop(1, '#140c08');
        ctx.fillStyle = roomGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const time = Date.now();
        const breath = Math.round(Math.sin(time / 250) * 2); // 1ピクセル単位の呼吸の上下

        // まばたき
        blinkTimer++;
        if (blinkTimer > 100) {
            isBlinking = true;
            if (blinkTimer > 104) { isBlinking = false; blinkTimer = 0; }
        }

        const cx = 155;
        const cy = 115 + breath;

        // 1. 独立したピンクのドットしっぽ
        ctx.strokeStyle = '#ffb3c1';
        ctx.lineWidth = 3;
        ctx.lineCap = 'square';
        ctx.beginPath();
        ctx.moveTo(cx + 15, cy + 35);
        ctx.quadraticCurveTo(cx + 45, cy + 35, cx + 50, cy + 5 + Math.sin(time/300)*3);
        ctx.stroke();

        // 2. 高精細ピクセル耳（3D的な立体シャドウつき）
        const drawPixelEar = (ex, ey, isLeft) => {
            // 外枠グレー
            drawPixelBlock(ex - 15, ey - 15, 30, 30, '#d1d1e0');
            // シャドウ（影）
            drawPixelBlock(isLeft ? ex - 12 : ex - 18, ey - 12, 27, 27, '#9e9eb3');
            // ピンクの内側
            drawPixelBlock(isLeft ? ex - 9 : ex - 15, ey - 9, 21, 21, '#ffccd5');
            // 中心ハイライト
            drawPixelBlock(isLeft ? ex - 6 : ex - 12, ey - 6, 12, 12, '#ffb3c1');
        };
        drawPixelEar(cx - 26, cy - 18, true);
        drawPixelEar(cx + 26, cy - 18, false);

        // 3. どっしり可愛いおにぎり型の大きな「胴体」
        // 外枠とメイン毛並み
        drawPixelBlock(cx - 36, cy + 5, 72, 40, '#e1e1ea');
        drawPixelBlock(cx - 32, cy, 64, 48, '#f0f0f5');
        // お腹のハイライト（さらに白いピクセル）
        drawPixelBlock(cx - 18, cy + 15, 36, 30, '#ffffff');
        // 下部影
        drawPixelBlock(cx - 32, cy + 44, 64, 4, '#b8b8c7');

        // 4. まあるい「頭」
        drawPixelBlock(cx - 24, cy - 16, 48, 32, '#e1e1ea');
        drawPixelBlock(cx - 22, cy - 14, 44, 28, '#fcfcfc');
        // 顎の影
        drawPixelBlock(cx - 20, cy + 10, 40, 3, '#c2c2d6');

        // 5. 完全に独立したくりくりおめめ（絶対に繋がらない！）
        const eyeX = 12;
        const eyeY = cy - 4;
        
        if (isBlinking || nezumiState === 'sleep') {
            // パチッと閉じた線目
            drawPixelBlock(cx - eyeX - 4, eyeY, 8, 2, '#5e5e70');
            drawPixelBlock(cx + eyeX - 4, eyeY, 8, 2, '#5e5e70');
        } else if (nezumiState === 'happy') {
            // にっこり（下向き半月）
            drawPixelBlock(cx - eyeX - 3, eyeY + 2, 6, 3, '#161626');
            drawPixelBlock(cx + eyeX - 3, eyeY + 2, 6, 3, '#161626');
            drawPixelBlock(cx - eyeX - 3, eyeY + 2, 6, 1, '#ffccd5'); // 赤み
            drawPixelBlock(cx + eyeX - 3, eyeY + 2, 6, 1, '#ffccd5');
        } else {
            // 通常のクッキリ四角い大きな黒目（光彩ドット入り）
            drawPixelBlock(cx - eyeX - 3, eyeY - 3, 6, 6, '#161626');
            drawPixelBlock(cx + eyeX - 3, eyeY - 3, 6, 6, '#161626');
            // 白い輝きドット
            drawPixelBlock(cx - eyeX - 2, eyeY - 2, 2, 2, '#ffffff');
            drawPixelBlock(cx + eyeX - 2, eyeY - 2, 2, 2, '#ffffff');
        }

        // 6. ピンクの可愛いマズルと鼻
        drawPixelBlock(cx - 2, cy + 1, 4, 3, '#ff85a1'); // 鼻
        drawPixelBlock(cx - 4, cy + 4, 8, 2, '#e1e1ea'); // ひげ袋

        // 7. シャープなひげ（ドットのドットらしいハッキリした線）
        ctx.strokeStyle = 'rgba(180, 180, 200, 0.5)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(cx - 6, cy + 3); ctx.lineTo(cx - 32, cy + 2);
        ctx.moveTo(cx - 6, cy + 5); ctx.lineTo(cx - 34, cy + 8);
        ctx.moveTo(cx + 6, cy + 3); ctx.lineTo(cx + 32, cy + 2);
        ctx.moveTo(cx + 6, cy + 5); ctx.lineTo(cx + 34, cy + 8);
        ctx.stroke();

        // 8. ちょこんとした手足
        drawPixelBlock(cx - 28, cy + 45, 8, 4, '#ffccd5'); // 左足
        drawPixelBlock(cx + 20, cy + 45, 8, 4, '#ffccd5'); // 右足

        if (nezumiState === 'eating') {
            // 黄色いピクセルチーズ
            drawPixelBlock(cx - 6, cy + 16, 12, 10, '#ffb703');
            drawPixelBlock(cx - 2, cy + 18, 2, 2, '#fb8500'); // 穴
            // チーズを掴む手
            drawPixelBlock(cx - 8, cy + 18, 4, 4, '#ffccd5');
            drawPixelBlock(cx + 4, cy + 18, 4, 4, '#ffccd5');
        } else {
            // 通常の前足
            drawPixelBlock(cx - 14, cy + 20, 4, 4, '#ffccd5');
            drawPixelBlock(cx + 10, cy + 20, 4, 4, '#ffccd5');
        }
    }

    function showScenario(key) {
        const s = scenarios[key];
        document.getElementById('dialogue-text').textContent = s.text;
        
        if (s.state) {
            nezumiState = s.state;
            setTimeout(() => { nezumiState = 'normal'; }, 2500);
        }
        if (s.loveBonus) {
            love += s.loveBonus;
            document.getElementById('love-val').textContent = love;
        }

        const container = document.getElementById('options-container');
        container.innerHTML = '';

        s.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.textContent = opt.text;
            btn.onclick = () => showScenario(opt.next);
            container.appendChild(btn);
        });
    }

    function giveCheese() {
        if (cheese > 0) {
            cheese--;
            love += 15;
            document.getElementById('cheese-val').textContent = cheese;
            document.getElementById('love-val').textContent = love;
            
            nezumiState = 'eating';
            document.getElementById('dialogue-text').textContent = "白ネズミ「わぁぁ！大好きなチーズだ！両手で持って…もぐもぐ。すっごく美味しいよ、ありがとう！」";
            
            setTimeout(() => {
                nezumiState = 'normal';
                showScenario('start');
            }, 3500);
        } else {
            document.getElementById('dialogue-text').textContent = "白ネズミ「チーズなくなっちゃったみたい。きみが側にいてくれるだけで、ボクは胸がいっぱいだよ。」";
        }
    }

    function strokeHead() {
        love += 3;
        document.getElementById('love-val').textContent = love;
        nezumiState = 'happy';
        document.getElementById('dialogue-text').textContent = "白ネズミ「あはは、きみの手、おっきくてあったかいねぇ…頭をなでられるの、大好き。」";
        
        if (Math.random() < 0.35) {
            cheese++;
            document.getElementById('cheese-val').textContent = cheese;
            setTimeout(() => {
                document.getElementById('dialogue-text').textContent = "白ネズミ「あ！お部屋のすみにクッキーのかけらを見つけたよ！はい、きみにプレゼント！」";
            }, 1800);
        }

        setTimeout(() => {
            nezumiState = 'normal';
            showScenario('start');
        }, 3500);
    }

    function runLoop() {
        drawPixelNezumi();
        requestAnimationFrame(runLoop);
    }

    showScenario('start');
    runLoop();
</script>
</body>
</html>

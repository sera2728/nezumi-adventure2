<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐹 ねずみのほっこりルーム Real</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #0d0d1a;
            color: #e0e0ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #game-container {
            width: 350px;
            background: #161626;
            border: 2px solid #2d2d44;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        /* ステータスバー */
        #status-bar {
            display: flex;
            justify-content: space-between;
            background: #090911;
            padding: 10px 16px;
            border-radius: 14px;
            font-size: 13px;
            border: 1px solid #1f1f33;
        }
        .status-item { display: flex; align-items: center; gap: 6px; }
        .val { color: #ffb703; font-weight: bold; }

        /* お部屋画面（リアルネズミ画像表示エリア） */
        #room-viewport {
            position: relative;
            width: 100%;
            height: 220px;
            background: linear-gradient(to bottom, #1a1a2e, #2d2d44);
            border-radius: 16px;
            border: 1px solid #2d2d44;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 10px;
        }
        
        /* 💡 ここがポイント！リアルなネズミの画像 */
        #nezumi-img {
            width: 180px;
            height: 180px;
            object-fit: contain;
            transition: transform 0.1s ease;
            /* 常に生きてるっぽい呼吸の動きをCSSで再現 */
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0% { transform: scale(1); }
            50% { transform: scale(1.03) translateY(-2px); }
            100% { transform: scale(1); }
        }

        /* 会話ウィンドウ */
        #dialogue-box {
            background: #090911;
            border: 1px solid #2d2d44;
            border-radius: 16px;
            padding: 14px;
            min-height: 85px;
        }
        #speaker-name {
            font-size: 12px;
            color: #ff758f;
            margin-bottom: 6px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        #dialogue-text {
            font-size: 13px;
            line-height: 1.6;
            color: #e2e8f0;
        }

        /* 選択肢・アクションエリア */
        #action-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .btn {
            background: #212135;
            color: #f1f5f9;
            border: 1px solid #31314d;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            text-align: left;
            transition: all 0.2s;
        }
        .btn:hover { background: #2d2d49; border-color: #4e4e75; }
        .btn:active { background: #171726; }
        
        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .act-btn {
            text-align: center;
            background: linear-gradient(135deg, #ffb703, #ee9b00);
            color: #0d0d1a;
            font-weight: bold;
            border: none;
        }
        .act-btn:hover { background: linear-gradient(135deg, #ffc947, #ffb703); transform: translateY(-1px); }
        .act-btn:active { transform: translateY(0); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="status-bar">
        <div class="status-item">🤝 なかよし度: <span id="love-val" class="val">10</span></div>
        <div class="status-item">🧀 チーズの数: <span id="cheese-val" class="val">3</span></div>
    </div>

    <div id="room-viewport">
        <img id="nezumi-img" src="https://images.unsplash.com/photo-1628853315213-26ebfb63ddb6?auto=format&fit=crop&w=400&q=80" alt="リアルな白ネズミ">
    </div>

    <div id="dialogue-box">
        <div id="speaker-name">白ネズミ</div>
        <div id="dialogue-text">「なにかお話しよっ！ボク、きみのこと もっと知りたいな。」</div>
    </div>

    <div id="action-area">
        <div id="options-container" style="display: flex; flex-direction: column; gap: 8px;">
            </div>
        <div class="action-row">
            <button class="btn act-btn" onclick="giveCheese()">🧀 チーズをあげる</button>
            <button class="btn act-btn" onclick="strokeHead()">👋 なでなでする</button>
        </div>
    </div>
</div>

<script>
    let love = 10;
    let cheese = 3;
    const nezumiImg = document.getElementById('nezumi-img');

    // 💡 状態にあわせて、本物のネズミの画像を切り替える用のURLリンク
    const nezumiPics = {
        normal: "https://images.unsplash.com/photo-1628853315213-26ebfb63ddb6?auto=format&fit=crop&w=400&q=80", // くりくりおめめのリアル白ネズミ
        happy: "https://images.unsplash.com/photo-1425082661705-1834bfd09dca?auto=format&fit=crop&w=400&q=80", // 嬉しそうな小動物の顔
        eating: "https://images.unsplash.com/photo-1542444459-db37a5da9d5f?auto=format&fit=crop&w=400&q=80"  // もぐもぐしてる横顔
    };

    const scenarios = {
        start: {
            text: "「なにかお話しよっ！ボク、きみのこと もっと知りたいな。」",
            options: [
                { text: "「今日の調子はどう？」", next: "condition" },
                { text: "「好きな食べ物は？」", next: "food" }
            ]
        },
        condition: {
            text: "「きみが会いに来てくれたから、すっごく元気が出たよ！お耳がピクピクしちゃう。えへへ。」",
            loveBonus: 5,
            state: 'happy',
            options: [{ text: "「それはよかった！」", next: "start" }]
        },
        food: {
            text: "「やっぱり、黄色くてあま～い、とろけるチーズが一番好き！きみは何が好き？」",
            options: [
                { text: "「お肉が好きだよ」", next: "meat" },
                { text: "「甘いお菓子が好き」", next: "sweet" }
            ]
        },
        meat: {
            text: "「お肉！ワイルドだねぇ！ボクは食べられないけど、きみがいっぱい食べて元気なら嬉しいな！」",
            loveBonus: 5,
            state: 'happy',
            options: [{ text: "「ありがとう！」", next: "start" }]
        },
        sweet: {
            text: "「お菓子！いいよねぇ、クッキーのひとなみだでもボクにとっては大ごちそうなんだ！」",
            loveBonus: 8,
            state: 'happy',
            options: [{ text: "「今度分けてあげるね」", next: "start" }]
        }
    };

    function showScenario(key) {
        const s = scenarios[key];
        document.getElementById('dialogue-text').textContent = s.text;
        
        if (s.state && nezumiPics[s.state]) {
            // 状態に合わせてリアル画像を切り替え
            nezumiImg.src = nezumiPics[s.state];
            // ピョコッと動くリアクション
            nezumiImg.style.transform = "scale(1.1) translateY(-5px)";
            setTimeout(() => { 
                nezumiImg.src = nezumiPics.normal; 
                nezumiImg.style.transform = "scale(1) translateY(0)";
            }, 2500);
        }
        if (s.loveBonus) {
            love += s.loveBonus;
            document.getElementById('love-val').textContent = love;
        }

        const container = document.getElementById('options-container');
        container.innerHTML = '';

        s.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.textContent = opt.text;
            btn.onclick = () => showScenario(opt.next);
            container.appendChild(btn);
        });
    }

    function giveCheese() {
        if (cheese > 0) {
            cheese--;
            love += 15;
            document.getElementById('cheese-val').textContent = cheese;
            document.getElementById('love-val').textContent = love;
            
            nezumiImg.src = nezumiPics.eating;
            nezumiImg.style.transform = "scale(1.05)";
            document.getElementById('dialogue-text').textContent = "白ネズミ「わぁぁ！大好きなチーズだ！両手で持って…もぐもぐ。すっごく美味しいよ、ありがとう！」";
            
            setTimeout(() => {
                nezumiImg.src = nezumiPics.normal;
                nezumiImg.style.transform = "scale(1)";
                showScenario('start');
            }, 3500);
        } else {
            document.getElementById('dialogue-text').textContent = "白ネズミ「チーズなくなっちゃったみたい。きみが側にいてくれるだけで、ボクは胸がいっぱいだよ。」";
        }
    }

    function strokeHead() {
        love += 3;
        document.getElementById('love-val').textContent = love;
        
        nezumiImg.src = nezumiPics.happy;
        // なでられて嬉しくて縮むようなエフェクト
        nezumiImg.style.transform = "scale(0.95) translateY(4px)";
        document.getElementById('dialogue-text').textContent = "白ネズミ「あはは、きみの手、おっきくてあったかいねぇ…頭をなでられるの、大好き。」";
        
        if (Math.random() < 0.35) {
            cheese++;
            document.getElementById('cheese-val').textContent = cheese;
            setTimeout(() => {
                document.getElementById('dialogue-text').textContent = "白ネズミ「あ！お部屋のすみにクッキーのかけらを見つけたよ！はい、きみにプレゼント！」";
            }, 1800);
        }

        setTimeout(() => {
            nezumiImg.src = nezumiPics.normal;
            nezumiImg.style.transform = "scale(1)";
            showScenario('start');
        }, 3500);
    }

    // 初期化
    showScenario('start');
</script>
</body>
</html>
